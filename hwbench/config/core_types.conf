[global]
runtime=1
monitor=none

# A single core-range group flattens into one cpu list and, with the default
# iterate scaling, pins one cpu per benchmark (regression for the empty
# "pinned on CPU []" display of single-cpu lists).
[single_core_range]
engine=sleep
stressor_range=auto
selected_cpus=core0-3

# Plain numeric logical cpus, without the CORE keyword.
[numeric_list]
engine=sleep
stressor_range=auto
selected_cpus=0-3

# The 'all' keyword expanded on a single, non-scaling run.
[all_none]
engine=sleep
stressor_range=auto
selected_cpus=all
selected_cpus_scaling=none

# An explicit numeric list pinned as a single group.
[explicit_none]
engine=sleep
stressor_range=auto
selected_cpus=0,2,4
selected_cpus_scaling=none
